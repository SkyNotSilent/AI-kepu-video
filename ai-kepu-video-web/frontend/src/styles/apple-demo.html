<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InsightCut - Apple Design Demo</title>
  <link rel="stylesheet" href="apple-design.css">
  <style>
    /* Hero Section - Apple 风格 */
    .hero {
      min-height: 692px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: linear-gradient(180deg, #f5f5f7 0%, #ffffff 100%);
      padding: var(--space-4xl) var(--space-xl);
    }

    .hero-content {
      max-width: 800px;
    }

    .hero-eyebrow {
      font-size: 21px;
      line-height: 1.381;
      font-weight: 600;
      letter-spacing: 0.011em;
      color: var(--color-accent);
      margin-bottom: var(--space-md);
    }

    .hero-title {
      font-size: 80px;
      line-height: 1.05;
      font-weight: 700;
      letter-spacing: -0.015em;
      color: var(--color-text);
      margin-bottom: var(--space-lg);
    }

    .hero-subtitle {
      font-size: 28px;
      line-height: 1.14286;
      font-weight: 400;
      letter-spacing: 0.007em;
      color: var(--color-text-secondary);
      margin-bottom: var(--space-2xl);
    }

    .hero-actions {
      display: flex;
      gap: var(--space-md);
      justify-content: center;
      flex-wrap: wrap;
    }

    /* Feature Cards */
    .features {
      padding: var(--space-4xl) var(--space-xl);
      background: #ffffff;
    }

    .feature-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--space-xl);
      max-width: 1200px;
      margin: 0 auto;
    }

    .feature-card {
      background: var(--color-bg-secondary);
      border-radius: var(--radius-2xl);
      padding: var(--space-2xl);
      text-align: center;
      transition: all var(--duration-normal) var(--ease-out);
    }

    .feature-card:hover {
      transform: translateY(-8px);
      box-shadow: var(--shadow-xl);
    }

    .feature-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto var(--space-lg);
      background: var(--color-primary);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 32px;
    }

    .feature-title {
      font-size: 24px;
      line-height: 1.16667;
      font-weight: 600;
      letter-spacing: 0.009em;
      color: var(--color-text);
      margin-bottom: var(--space-sm);
    }

    .feature-desc {
      font-size: 17px;
      line-height: 1.47059;
      font-weight: 400;
      letter-spacing: -0.022em;
      color: var(--color-text-secondary);
    }

    /* Editor Preview */
    .editor-preview {
      padding: var(--space-4xl) var(--space-xl);
      background: var(--color-bg-secondary);
    }

    .preview-container {
      max-width: 1200px;
      margin: 0 auto;
      background: white;
      border-radius: var(--radius-2xl);
      box-shadow: var(--shadow-xl);
      overflow: hidden;
    }

    .preview-header {
      padding: var(--space-xl);
      border-bottom: 1px solid var(--color-divider);
      display: flex;
      align-items: center;
      gap: var(--space-md);
    }

    .preview-dots {
      display: flex;
      gap: 8px;
    }

    .preview-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--color-border);
    }

    .preview-body {
      padding: var(--space-2xl);
      min-height: 400px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--color-text-tertiary);
      font-size: 21px;
    }

    /* Responsive */
    @media (max-width: 1068px) {
      .hero-title {
        font-size: 56px;
      }

      .hero-subtitle {
        font-size: 21px;
      }

      .feature-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 734px) {
      .hero {
        min-height: auto;
        padding: var(--space-2xl) var(--space-md);
      }

      .hero-title {
        font-size: 40px;
      }

      .hero-subtitle {
        font-size: 19px;
      }

      .hero-actions {
        flex-direction: column;
      }

      .feature-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <!-- Hero Section -->
  <section class="hero">
    <div class="hero-content fade-in">
      <div class="hero-eyebrow">全新 InsightCut</div>
      <h1 class="hero-title">创作，从未如此简单。</h1>
      <p class="hero-subtitle">AI 驱动的认知科普视频生成工具。输入主题，一键生成专业视频。</p>
      <div class="hero-actions">
        <button class="btn btn-primary btn-lg">开始创作</button>
        <button class="btn btn-ghost btn-lg">了解更多</button>
      </div>
    </div>
  </section>

  <!-- Features -->
  <section class="features">
    <div class="feature-grid">
      <div class="feature-card">
        <div class="feature-icon">✨</div>
        <h3 class="feature-title">智能生成</h3>
        <p class="feature-desc">输入主题，AI 自动生成文案、配音、画面。无需专业技能。</p>
      </div>

      <div class="feature-card">
        <div class="feature-icon">🎬</div>
        <h3 class="feature-title">实时预览</h3>
        <p class="feature-desc">所见即所得的编辑体验。每一帧都在你的掌控之中。</p>
      </div>

      <div class="feature-card">
        <div class="feature-icon">⚡</div>
        <h3 class="feature-title">极速导出</h3>
        <p class="feature-desc">一键导出 MP4 或剪映草稿。支持多种画幅比例。</p>
      </div>
    </div>
  </section>

  <!-- Editor Preview -->
  <section class="editor-preview">
    <div class="preview-container">
      <div class="preview-header">
        <div class="preview-dots">
          <div class="preview-dot" style="background: #ff5f57;"></div>
          <div class="preview-dot" style="background: #febc2e;"></div>
          <div class="preview-dot" style="background: #28c840;"></div>
        </div>
        <span style="color: var(--color-text-tertiary); font-size: 14px;">InsightCut Editor</span>
      </div>
      <div class="preview-body">
        编辑器预览区域
      </div>
    </div>
  </section>

  <!-- CTA Section -->
  <section class="hero" style="background: white;">
    <div class="hero-content">
      <h2 class="text-display">准备好开始了吗？</h2>
      <p class="text-body-lg" style="margin-top: var(--space-lg); margin-bottom: var(--space-2xl);">
        立即体验 AI 驱动的视频创作流程。
      </p>
      <button class="btn btn-primary btn-lg">免费开始</button>
    </div>
  </section>
</body>
</html>
