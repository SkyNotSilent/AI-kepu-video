<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InsightCut Editor - Apple Design</title>
  <link rel="stylesheet" href="apple-design.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #f5f5f7;
    }

    /* ==================== 顶部导航栏 ==================== */
    .navbar {
      height: 52px;
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(0, 0, 0, 0.1);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .navbar-left {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .navbar-logo {
      font-size: 19px;
      font-weight: 600;
      color: #1d1d1f;
      letter-spacing: -0.022em;
    }

    .navbar-title {
      font-size: 14px;
      color: #6e6e73;
      letter-spacing: -0.016em;
    }

    .navbar-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .navbar-btn {
      padding: 6px 16px;
      border: none;
      border-radius: 980px;
      font-size: 14px;
      font-weight: 400;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .navbar-btn-ghost {
      background: transparent;
      color: #1d1d1f;
    }

    .navbar-btn-ghost:hover {
      background: rgba(0, 0, 0, 0.06);
    }

    .navbar-btn-primary {
      background: #000000;
      color: #ffffff;
    }

    .navbar-btn-primary:hover {
      background: #1d1d1f;
      transform: scale(1.02);
    }

    /* ==================== 编辑器布局 ==================== */
    .editor-container {
      display: grid;
      grid-template-columns: 280px 1fr 320px;
      gap: 16px;
      padding: 16px;
      height: calc(100vh - 52px);
      max-width: 1920px;
      margin: 0 auto;
    }

    /* ==================== 左侧：分镜列表 ==================== */
    .storyboard-panel {
      background: #ffffff;
      border-radius: 18px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel-header {
      padding: 20px;
      border-bottom: 1px solid #f5f5f7;
    }

    .panel-title {
      font-size: 17px;
      font-weight: 600;
      color: #1d1d1f;
      letter-spacing: -0.022em;
      margin-bottom: 4px;
    }

    .panel-subtitle {
      font-size: 14px;
      color: #86868b;
      letter-spacing: -0.016em;
    }

    .segment-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }

    .segment-item {
      background: #f5f5f7;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .segment-item:hover {
      background: #e8e8ed;
      transform: translateX(4px);
    }

    .segment-item.active {
      background: #000000;
      color: #ffffff;
    }

    .segment-thumb {
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #d2d2d7;
      border-radius: 8px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: #86868b;
    }

    .segment-item.active .segment-thumb {
      background: #1d1d1f;
      color: #86868b;
    }

    .segment-index {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: -0.01em;
      margin-bottom: 4px;
    }

    .segment-text {
      font-size: 12px;
      line-height: 1.4;
      color: #6e6e73;
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .segment-item.active .segment-text {
      color: #a1a1a6;
    }

    /* ==================== 中间：预览区域 ==================== */
    .preview-panel {
      background: #ffffff;
      border-radius: 18px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .preview-stage {
      flex: 1;
      background: #000000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
      position: relative;
    }

    .preview-canvas {
      width: 100%;
      max-width: 100%;
      max-height: 100%;
      aspect-ratio: 16 / 9;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 12px;
      box-shadow: 0 16px 64px rgba(0, 0, 0, 0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 21px;
      font-weight: 600;
      position: relative;
      overflow: hidden;
    }

    .preview-subtitle {
      position: absolute;
      bottom: 48px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(10px);
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 19px;
      font-weight: 600;
      color: white;
      text-align: center;
      max-width: 80%;
    }

    .preview-controls {
      padding: 20px 24px;
      border-top: 1px solid #f5f5f7;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .play-btn {
      width: 40px;
      height: 40px;
      border: none;
      border-radius: 50%;
      background: #000000;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      flex-shrink: 0;
    }

    .play-btn:hover {
      background: #1d1d1f;
      transform: scale(1.05);
    }

    .play-btn:active {
      transform: scale(0.95);
    }

    .timeline {
      flex: 1;
      height: 4px;
      background: #e8e8ed;
      border-radius: 2px;
      position: relative;
      cursor: pointer;
    }

    .timeline-progress {
      height: 100%;
      background: #000000;
      border-radius: 2px;
      width: 35%;
      transition: width 0.1s linear;
    }

    .time-label {
      font-size: 12px;
      color: #86868b;
      font-variant-numeric: tabular-nums;
      flex-shrink: 0;
    }

    /* ==================== 右侧：编辑面板 ==================== */
    .edit-panel {
      background: #ffffff;
      border-radius: 18px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .edit-tabs {
      display: flex;
      border-bottom: 1px solid #f5f5f7;
    }

    .edit-tab {
      flex: 1;
      padding: 14px 16px;
      border: none;
      background: transparent;
      font-size: 14px;
      font-weight: 400;
      color: #6e6e73;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
    }

    .edit-tab:hover {
      color: #1d1d1f;
    }

    .edit-tab.active {
      color: #1d1d1f;
      font-weight: 600;
    }

    .edit-tab.active::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: #000000;
    }

    .edit-body {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }

    .form-group {
      margin-bottom: 24px;
    }

    .form-label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #1d1d1f;
      margin-bottom: 8px;
      letter-spacing: -0.016em;
    }

    .form-input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #d2d2d7;
      border-radius: 10px;
      font-size: 14px;
      color: #1d1d1f;
      background: #ffffff;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .form-input:focus {
      outline: none;
      border-color: #0071e3;
      box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.1);
    }

    .form-textarea {
      min-height: 120px;
      resize: vertical;
      font-family: inherit;
    }

    .action-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 16px;
    }

    .action-btn {
      padding: 10px 16px;
      border: 1px solid #d2d2d7;
      border-radius: 10px;
      background: #ffffff;
      font-size: 13px;
      color: #1d1d1f;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .action-btn:hover {
      background: #f5f5f7;
      border-color: #86868b;
    }

    .action-btn:active {
      transform: scale(0.98);
    }

    .divider {
      height: 1px;
      background: #f5f5f7;
      margin: 24px 0;
    }

    /* ==================== 响应式 ==================== */
    @media (max-width: 1400px) {
      .editor-container {
        grid-template-columns: 240px 1fr 280px;
      }
    }

    @media (max-width: 1068px) {
      .editor-container {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr auto;
      }

      .storyboard-panel {
        max-height: 200px;
      }

      .segment-list {
        display: flex;
        gap: 8px;
        overflow-x: auto;
      }

      .segment-item {
        min-width: 180px;
        margin-bottom: 0;
      }
    }
  </style>
</head>
<body>
  <!-- 顶部导航栏 -->
  <nav class="navbar">
    <div class="navbar-left">
      <div class="navbar-logo">InsightCut</div>
      <div class="navbar-title">认知科普视频 · 3:4 竖屏</div>
    </div>
    <div class="navbar-right">
      <button class="navbar-btn navbar-btn-ghost">返回</button>
      <button class="navbar-btn navbar-btn-primary">导出</button>
    </div>
  </nav>

  <!-- 编辑器主体 -->
  <div class="editor-container">
    <!-- 左侧：分镜列表 -->
    <aside class="storyboard-panel">
      <div class="panel-header">
        <div class="panel-title">分镜列表</div>
        <div class="panel-subtitle">5 个段落</div>
      </div>
      <div class="segment-list">
        <div class="segment-item active">
          <div class="segment-thumb">16:9</div>
          <div class="segment-index">镜头 01</div>
          <div class="segment-text">什么是认知科学？认知科学是研究人类思维和智能的跨学科领域。</div>
        </div>
        <div class="segment-item">
          <div class="segment-thumb">16:9</div>
          <div class="segment-index">镜头 02</div>
          <div class="segment-text">它结合了心理学、神经科学、语言学、哲学和计算机科学。</div>
        </div>
        <div class="segment-item">
          <div class="segment-thumb">16:9</div>
          <div class="segment-index">镜头 03</div>
          <div class="segment-text">通过研究大脑如何处理信息，我们能更好地理解人类智能。</div>
        </div>
        <div class="segment-item">
          <div class="segment-thumb">16:9</div>
          <div class="segment-index">镜头 04</div>
          <div class="segment-text">认知科学的应用包括人工智能、教育、医疗等多个领域。</div>
        </div>
        <div class="segment-item">
          <div class="segment-thumb">16:9</div>
          <div class="segment-index">镜头 05</div>
          <div class="segment-text">让我们一起探索人类思维的奥秘。</div>
        </div>
      </div>
    </aside>

    <!-- 中间：预览区域 -->
    <section class="preview-panel">
      <div class="preview-stage">
        <div class="preview-canvas">
          <div style="text-align: center; padding: 32px;">
            <div style="font-size: 48px; margin-bottom: 16px;">🧠</div>
            <div style="font-size: 28px; font-weight: 700; margin-bottom: 12px;">认知科学</div>
            <div style="font-size: 17px; font-weight: 400; opacity: 0.9;">探索人类思维的奥秘</div>
          </div>
          <div class="preview-subtitle">什么是认知科学？</div>
        </div>
      </div>
      <div class="preview-controls">
        <button class="play-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
            <polygon points="5 3 19 12 5 21 5 3"/>
          </svg>
        </button>
        <div class="timeline">
          <div class="timeline-progress"></div>
        </div>
        <div class="time-label">00:07 / 00:20</div>
      </div>
    </section>

    <!-- 右侧：编辑面板 -->
    <aside class="edit-panel">
      <div class="edit-tabs">
        <button class="edit-tab active">编辑</button>
        <button class="edit-tab">素材</button>
        <button class="edit-tab">设置</button>
      </div>
      <div class="edit-body">
        <div class="form-group">
          <label class="form-label">文案内容</label>
          <textarea class="form-input form-textarea" placeholder="输入文案内容...">什么是认知科学？认知科学是研究人类思维和智能的跨学科领域。</textarea>
        </div>

        <div class="form-group">
          <label class="form-label">画面描述</label>
          <textarea class="form-input form-textarea" placeholder="描述画面内容...">一个发光的大脑图标，周围环绕着神经网络连接，科技感背景，紫色渐变。</textarea>
        </div>

        <div class="action-group">
          <button class="action-btn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="18" height="18" rx="2"/>
              <circle cx="8.5" cy="8.5" r="1.5"/>
              <polyline points="21 15 16 10 5 21"/>
            </svg>
            重新生成图片
          </button>
          <button class="action-btn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 18V5l12-2v13"/>
              <circle cx="6" cy="18" r="3"/>
              <circle cx="18" cy="16" r="3"/>
            </svg>
            重新生成音频
          </button>
        </div>

        <div class="action-group">
          <button class="action-btn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="17 8 12 3 7 8"/>
              <line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
            上传图片
          </button>
          <button class="action-btn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 14 4 9l5-5"/>
              <path d="M4 9h10a6 6 0 0 1 0 12h-3"/>
            </svg>
            撤销替换
          </button>
        </div>

        <div class="divider"></div>

        <div class="form-group">
          <label class="form-label">音色选择</label>
          <select class="form-input">
            <option>米仔（推荐）</option>
            <option>小美</option>
            <option>小帅</option>
            <option>老王</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label">字幕位置</label>
          <input type="range" class="form-input" min="0" max="100" value="88" style="padding: 0;">
        </div>
      </div>
    </aside>
  </div>

  <script>
    // 简单的交互演示
    document.querySelectorAll('.segment-item').forEach((item, index) => {
      item.addEventListener('click', () => {
        document.querySelectorAll('.segment-item').forEach(i => i.classList.remove('active'));
        item.classList.add('active');
      });
    });

    document.querySelectorAll('.edit-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.edit-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
      });
    });

    // 播放按钮切换
    const playBtn = document.querySelector('.play-btn');
    let isPlaying = false;
    playBtn.addEventListener('click', () => {
      isPlaying = !isPlaying;
      playBtn.innerHTML = isPlaying
        ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>'
        : '<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>';
    });
  </script>
</body>
</html>
